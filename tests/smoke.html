<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pocket Count smoke test</title>
  <style>body{font-family:system-ui;padding:24px;background:#eef2f7;color:#172033}li{margin:8px 0}.ok{color:#087f5b}.ng{color:#c92a2a}iframe{width:100%;height:520px;border:1px solid #ccd5e2;border-radius:16px;background:#fff}</style>
</head>
<body>
  <h1>Smoke test</h1>
  <ul id="results"><li>確認中...</li></ul>
  <iframe id="target" src="../index.html?smoke=1" title="Pocket Count"></iframe>
  <script>
    const frame = document.getElementById("target");
    frame.addEventListener("load", () => {
      const doc = frame.contentDocument;
      const checks = [
        ["アプリが描画される", Boolean(doc.querySelector("#app .top"))],
        ["プリセット操作が存在する", Boolean(doc.querySelector("[data-action='add-preset']"))],
        ["スタイルが読み込まれる", frame.contentWindow.getComputedStyle(doc.body).fontFamily.includes("system-ui")],
      ];
      document.getElementById("results").innerHTML = checks.map(([label, ok]) => `<li class="${ok ? "ok" : "ng"}">${ok ? "✓" : "×"} ${label}</li>`).join("");
    });
  </script>
</body>
</html>
