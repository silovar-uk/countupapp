name: Patch reset button color

on:
  push:
    paths:
      - '.patch-reset-button-color-trigger'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make reset button orange
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          css = '''    .tool-btn[data-action="reset"] {
            border-color: rgba(249, 115, 22, .34);
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: #fff;
            box-shadow: 0 12px 24px rgba(249, 115, 22, .24);
          }

'''

          if '.tool-btn[data-action="reset"]' not in text:
              marker = '    .tool-btn.danger {\n'
              if marker not in text:
                  raise SystemExit('Target CSS marker was not found.')
              text = text.replace(marker, css + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch and clean up
        run: |
          rm -f .github/workflows/patch-reset-button-color.yml .patch-reset-button-color-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-reset-button-color.yml .patch-reset-button-color-trigger
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Make reset button orange"
            git push
          fi
