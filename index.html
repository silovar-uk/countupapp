<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eef2f7" />
  <title>Pocket Count</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #eef2f7;
    }

    .app-frame {
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      border: 0;
      display: block;
      background: #eef2f7;
    }

    .fallback {
      position: fixed;
      inset: auto 16px 16px;
      z-index: 10;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .92);
      color: #172033;
      font: 700 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      box-shadow: 0 12px 30px rgba(38, 53, 84, .14);
    }

    .fallback a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <iframe class="app-frame" src="./app.html" title="Pocket Count"></iframe>
  <noscript>
    <div class="fallback">JavaScriptが無効です。<a href="./app.html">アプリを開く</a></div>
  </noscript>

  <script>
    const resetButtonStyle = `
      .tool-btn[data-action="reset"] {
        border-color: rgba(249, 115, 22, .38) !important;
        background: linear-gradient(135deg, #f97316 0%, #fb923c 100%) !important;
        color: #fff !important;
        box-shadow: 0 12px 24px rgba(249, 115, 22, .26) !important;
      }
    `;

    const frame = document.querySelector(".app-frame");

    function injectResetButtonStyle() {
      try {
        const doc = frame.contentDocument;
        if (!doc || !doc.head) return;

        let style = doc.getElementById("reset-button-highlight-style");
        if (!style) {
          style = doc.createElement("style");
          style.id = "reset-button-highlight-style";
          doc.head.appendChild(style);
        }

        if (style.textContent !== resetButtonStyle) {
          style.textContent = resetButtonStyle;
        }
      } catch (error) {
        console.warn("Reset button style injection failed", error);
      }
    }

    frame.addEventListener("load", () => {
      injectResetButtonStyle();
      window.setTimeout(injectResetButtonStyle, 100);
      window.setTimeout(injectResetButtonStyle, 500);
    });
  </script>
</body>
</html>
