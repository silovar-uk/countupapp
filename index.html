<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eef2f7" />
  <title>Pocket Count</title>
  <style>
    html {
      background: #eef2f7;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: #eef2f7;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .loading,
    .fallback {
      margin: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 12px 30px rgba(38, 53, 84, .14);
      font-weight: 800;
      line-height: 1.6;
    }

    a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="loading">Pocket Countを読み込み中...</div>
  <noscript>
    <div class="fallback">JavaScriptが無効です。<a href="./app.html">アプリを開く</a></div>
  </noscript>

  <script>
    const resetButtonStyle = `
      <style id="reset-button-highlight-style">
        .tool-btn[data-action="reset"] {
          border-color: rgba(249, 115, 22, .38) !important;
          background: linear-gradient(135deg, #f97316 0%, #fb923c 100%) !important;
          color: #fff !important;
          box-shadow: 0 12px 24px rgba(249, 115, 22, .26) !important;
        }
      </style>
    `;

    async function boot() {
      try {
        const response = await fetch("./app.html", { cache: "no-store" });
        if (!response.ok) throw new Error(`Failed to load app.html: ${response.status}`);

        let html = await response.text();
        html = html.replace("</head>", `${resetButtonStyle}</head>`);

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.body.innerHTML = `
          <div class="fallback">
            アプリの読み込みに失敗しました。<br>
            <a href="./app.html">直接アプリを開く</a>
          </div>
        `;
      }
    }

    boot();
  </script>
</body>
</html>
